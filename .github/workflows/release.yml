name: Release

on:
  push:
    tags:
      - 'v1.*.*'
  release:
    types: [created]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-package:
    runs-on: macos-latest
    strategy:
      matrix:
        target:
          # macOS targets
          - x86_64-apple-darwin     # Intel Mac (10.7+)
          - aarch64-apple-darwin    # Apple Silicon (11.0+, M1/M2/M3)

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Build for ${{ matrix.target }}
        run: cargo build --release --target ${{ matrix.target }} --verbose

      - name: Package binary for ${{ matrix.target }}
        run: |
          mkdir -p dist/${{ matrix.target }}
          BIN_NAME=swizzy
          cp target/${{ matrix.target }}/release/$BIN_NAME dist/${{ matrix.target }}/
          cd dist && tar -czf ${{ matrix.target }}.tar.gz ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.target }}
          path: dist/${{ matrix.target }}.tar.gz

  # Create GitHub release with all artifacts
  create-release:
    needs: build-and-package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: artifacts/**/*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
